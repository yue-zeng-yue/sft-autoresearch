# Agent-editable SFT hyperparameter config.
# For real training, set backend: swift after ms-swift is installed.
backend: mock
seed: 42

experiment:
  description: baseline mock smoke test
  time_budget_seconds: 1800
  kill_after_seconds: 3600
  primary_metric: score
  higher_is_better: true

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: bfloat16
  use_hf: true

data:
  train: data/train.jsonl
  val: data/val.jsonl
  eval: data/eval.jsonl

training:
  train_type: lora
  num_train_epochs: 1
  max_steps: 100
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  max_length: 2048
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  dataloader_num_workers: 2

lora:
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear

swift:
  executable: swift
  command: sft
  # ms-swift versions differ: recent examples use tuner_type, some docs use train_type.
  train_type_arg: tuner_type
  extra_args:
    check_model: false

eval:
  backend: mock
  max_new_tokens: 256
  temperature: 0.0
  external_command: []

scoring:
  weights:
    exact_match: 0.35
    contains_rate: 0.35
    loss_score: 0.20
    speed_score: 0.10
