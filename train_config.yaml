# Agent-editable SFT hyperparameter config.
# For real training, set backend: swift after ms-swift is installed.
backend: swift
seed: 42

experiment:
  description: baseline swift peft eval
  time_budget_seconds: 1800
  kill_after_seconds: 3600
  primary_metric: score
  higher_is_better: true

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  torch_dtype: bfloat16
  use_hf: true

data:
  train: data/train.jsonl
  val: data/val.jsonl
  eval: data/eval.jsonl

training:
  max_steps: 20
  max_length: 1024
  save_steps: 10
  eval_steps: 10
  train_type: lora
  num_train_epochs: 1
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  logging_steps: 1
  save_total_limit: 1
  dataloader_num_workers: 2


lora:
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear

swift:
  executable: .venv/bin/swift
  command: sft
  train_type_arg: tuner_type


eval:
  backend: peft
  max_new_tokens: 256
  temperature: 0.0
  external_command: []

scoring:
  weights:
    exact_match: 0.35
    contains_rate: 0.35
    loss_score: 0.20
    speed_score: 0.10
